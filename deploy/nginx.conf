# Nginx配置示例 - 字库取模工具
# 将此文件复制到 /etc/nginx/conf.d/ 目录
# 然后运行: nginx -t && nginx -s reload

server {
    listen 80;
    server_name your-domain.com;  # 修改为您的域名
    
    # 网站根目录
    root /var/www/html/font-modulo-tool;
    index index.html;

    # 字符集
    charset utf-8;

    # 访问日志
    access_log /var/log/nginx/font-modulo-tool-access.log;
    error_log /var/log/nginx/font-modulo-tool-error.log;

    # 启用Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 静态资源缓存设置
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML文件不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # SPA路由支持 - 所有路由都指向index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 限制请求大小
    client_max_body_size 10M;
}

