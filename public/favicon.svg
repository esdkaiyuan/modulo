<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PixelCraft animated pixel icon">
  <style>
    :root {
      color-scheme: dark;
    }

    .bg {
      fill: #0b1016;
    }

    .grid {
      fill: #151d27;
    }

    .pixel {
      animation: pulse 2.4s steps(1, end) infinite;
      filter: drop-shadow(0 0 4px currentColor);
    }

    .p1 { color: #3ddc84; animation-delay: 0s; }
    .p2 { color: #4fd1ff; animation-delay: .2s; }
    .p3 { color: #b073ff; animation-delay: .4s; }
    .p4 { color: #9fffc5; animation-delay: .6s; }
    .p5 { color: #47f1d8; animation-delay: .8s; }
    .p6 { color: #f6d365; animation-delay: 1s; }

    @keyframes pulse {
      0%, 100% { opacity: .35; transform: translateY(0); }
      16% { opacity: 1; transform: translateY(-2px); }
      32% { opacity: .65; transform: translateY(0); }
      48% { opacity: 1; transform: translateY(2px); }
      64% { opacity: .5; transform: translateY(0); }
    }
  </style>

  <rect class="bg" width="64" height="64" rx="10" />
  <path class="grid" d="M12 12h8v8h-8zM28 12h8v8h-8zM44 12h8v8h-8zM12 28h8v8h-8zM28 28h8v8h-8zM44 28h8v8h-8zM12 44h8v8h-8zM28 44h8v8h-8zM44 44h8v8h-8z" opacity=".7" />

  <g transform-origin="32 32">
    <rect class="pixel p1" x="12" y="28" width="8" height="8" rx="1" fill="currentColor" />
    <rect class="pixel p2" x="20" y="20" width="8" height="8" rx="1" fill="currentColor" />
    <rect class="pixel p3" x="28" y="28" width="8" height="8" rx="1" fill="currentColor" />
    <rect class="pixel p4" x="36" y="20" width="8" height="8" rx="1" fill="currentColor" />
    <rect class="pixel p5" x="44" y="28" width="8" height="8" rx="1" fill="currentColor" />
    <rect class="pixel p6" x="28" y="44" width="8" height="8" rx="1" fill="currentColor" />
  </g>
</svg>
